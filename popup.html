<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Read It Later</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>📖 Read It Later</h1>
      <button id="saveBtn" class="btn btn-primary">+ Save This Page</button>
    </header>

    <div id="notification" class="notification hidden"></div>

    <div class="toolbar">
      <input type="text" id="searchInput" placeholder="Search saved pages..." />
      <div class="filter-group">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="unread">Unread</button>
        <button class="filter-btn" data-filter="read">Read</button>
      </div>
    </div>

    <div id="itemList" class="item-list">
      <!-- Items rendered by JS -->
    </div>

    <div id="emptyState" class="empty-state hidden">
      <p>📭 No saved pages yet</p>
      <p class="hint">Click the button above to save the current page</p>
    </div>

    <footer>
      <span id="itemCount">0 items</span>
      <button id="clearAllBtn" class="btn btn-danger btn-small">Clear All</button>
    </footer>
  </div>

  <script src="read-it-later.js"></script>
  <script src="popup.js"></script>
</body>
</html>
